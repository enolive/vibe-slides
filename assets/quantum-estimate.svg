<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#0d0221" rx="20"/>
  <defs>
    <radialGradient id="quantumGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff00ff" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#00ffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffff00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="70" fill="url(#quantumGlow)">
    <animate attributeName="r" values="70;80;70" dur="0.5s" repeatCount="indefinite"/>
  </circle>
  <text x="100" y="115" font-family="Courier New" font-size="40" fill="white" text-anchor="middle" font-weight="bold">¿?</text>
  <circle cx="70" cy="60" r="4" fill="#ff00ff">
    <animate attributeName="opacity" values="1;0;1" dur="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="140" cy="70" r="3" fill="#00ffff">
    <animate attributeName="opacity" values="0;1;0" dur="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="140" r="5" fill="#ffff00">
    <animate attributeName="opacity" values="1;0.2;1" dur="0.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="130" r="3" fill="#00ff00">
    <animate attributeName="opacity" values="0;1;0" dur="0.6s" repeatCount="indefinite"/>
  </circle>
  <path d="M 30 100 Q 50 80, 70 100" stroke="#ff00ff" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 130 100 Q 150 120, 170 100" stroke="#00ffff" stroke-width="2" fill="none" opacity="0.6"/>
</svg>