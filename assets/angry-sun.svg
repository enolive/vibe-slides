<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Sun rays -->
  <g stroke="#FF8C00" stroke-width="6" stroke-linecap="round">
    <line x1="100" y1="10" x2="100" y2="30"/>
    <line x1="100" y1="170" x2="100" y2="190"/>
    <line x1="10" y1="100" x2="30" y2="100"/>
    <line x1="170" y1="100" x2="190" y2="100"/>
    <line x1="29" y1="29" x2="43" y2="43"/>
    <line x1="157" y1="157" x2="171" y2="171"/>
    <line x1="171" y1="29" x2="157" y2="43"/>
    <line x1="43" y1="157" x2="29" y2="171"/>
  </g>
  <!-- Sun body -->
  <circle cx="100" cy="100" r="50" fill="#FFD700" stroke="#FF8C00" stroke-width="4"/>
  <!-- Angry eyebrows -->
  <line x1="75" y1="82" x2="90" y2="90" stroke="#8B0000" stroke-width="5" stroke-linecap="round"/>
  <line x1="125" y1="82" x2="110" y2="90" stroke="#8B0000" stroke-width="5" stroke-linecap="round"/>
  <!-- Angry eyes -->
  <circle cx="83" cy="97" r="6" fill="#8B0000"/>
  <circle cx="117" cy="97" r="6" fill="#8B0000"/>
  <!-- Angry mouth / scowl -->
  <path d="M 78 120 Q 100 110 122 120" stroke="#8B0000" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Sweat drops -->
  <ellipse cx="145" cy="75" rx="5" ry="8" fill="#87CEEB" opacity="0.8"/>
  <ellipse cx="158" cy="88" rx="4" ry="6" fill="#87CEEB" opacity="0.8"/>
</svg>
