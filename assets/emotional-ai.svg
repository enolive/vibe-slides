<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Robot head -->
  <rect x="50" y="40" width="100" height="100" rx="10" fill="#3498db" stroke="#2c3e50" stroke-width="2"/>
  
  <!-- Left eye -->
  <circle cx="75" cy="70" r="12" fill="#ecf0f1"/>
  <circle cx="75" cy="70" r="8" fill="#e74c3c"/>
  <circle cx="77" cy="68" r="3" fill="#000"/>
  
  <!-- Right eye (teary) -->
  <circle cx="125" cy="70" r="12" fill="#ecf0f1"/>
  <circle cx="125" cy="70" r="8" fill="#f39c12"/>
  <circle cx="127" cy="68" r="3" fill="#000"/>
  <!-- Tear drop -->
  <path d="M 125 85 Q 123 95 125 105" stroke="#3498db" stroke-width="2" fill="none"/>
  <circle cx="125" cy="108" r="2" fill="#3498db"/>
  
  <!-- Mouth (emotional smile) -->
  <path d="M 75 105 Q 100 125 125 105" stroke="#2c3e50" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Heart icon on chest -->
  <path d="M 100 140 L 90 130 Q 85 125 85 120 Q 85 115 90 115 Q 95 115 100 120 Q 105 115 110 115 Q 115 115 115 120 Q 115 125 110 130 Z" fill="#e74c3c"/>
  
  <!-- Antenna with sparkle -->
  <line x1="100" y1="40" x2="100" y2="10" stroke="#2c3e50" stroke-width="3"/>
  <circle cx="100" cy="8" r="4" fill="#f39c12"/>
  <circle cx="93" cy="20" r="2" fill="#f1c40f"/>
  <circle cx="107" cy="25" r="2" fill="#f1c40f"/>
</svg>