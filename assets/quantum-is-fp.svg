<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="quantumGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B21A8"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="#0F172A"/>
  
  <!-- Quantum waves -->
  <path d="M0,150 Q50,100 100,150 T200,150 T300,150 T400,150" 
        stroke="#A855F7" stroke-width="3" fill="none" opacity="0.8"/>
  <path d="M0,150 Q50,180 100,150 T200,150 T300,150 T400,150" 
        stroke="#06B6D4" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M0,150 Q50,120 100,150 T200,150 T300,150 T400,150" 
        stroke="#A855F7" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- Lambda symbol -->
  <text x="200" y="170" font-family="monospace" font-size="120" 
        fill="url(#quantumGrad)" text-anchor="middle" font-weight="bold">λ</text>
  
  <!-- Electron orbits -->
  <ellipse cx="200" cy="150" rx="140" ry="40" stroke="#22D3EE" stroke-width="1" fill="none" opacity="0.4"/>
  <ellipse cx="200" cy="150" rx="160" ry="50" stroke="#A855F7" stroke-width="1" fill="none" opacity="0.3"/>
  <ellipse cx="200" cy="150" rx="120" ry="30" stroke="#22D3EE" stroke-width="1" fill="none" opacity="0.5"/>
  
  <!-- Dots representing particles in superposition -->
  <circle cx="120" cy="140" r="4" fill="#22D3EE">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="280" cy="160" r="4" fill="#A855F7">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="180" r="3" fill="#22D3EE">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="240" cy="130" r="3" fill="#A855F7">
    <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="200" y="270" font-family="monospace" font-size="16" 
        fill="#E2E8F0" text-anchor="middle">Quantum + FP = ∞</text>
</svg>