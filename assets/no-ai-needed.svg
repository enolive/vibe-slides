<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Robot head -->
  <rect x="60" y="50" width="80" height="70" rx="10" fill="#4a90d9" stroke="#2c5f8a" stroke-width="3"/>
  <!-- Eyes (X marks = dead/useless) -->
  <line x1="80" y1="75" x2="92" y2="87" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="92" y1="75" x2="80" y2="87" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="108" y1="75" x2="120" y2="87" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="120" y1="75" x2="108" y2="87" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Sad mouth -->
  <path d="M 80 105 Q 100 95 120 105" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Antenna -->
  <line x1="100" y1="50" x2="100" y2="30" stroke="#2c5f8a" stroke-width="3"/>
  <circle cx="100" cy="25" r="6" fill="#e74c3c"/>
  <!-- Body -->
  <rect x="70" y="120" width="60" height="40" rx="5" fill="#4a90d9" stroke="#2c5f8a" stroke-width="3"/>
  <!-- Big red X over the whole thing -->
  <line x1="40" y1="30" x2="160" y2="170" stroke="#e74c3c" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <line x1="160" y1="30" x2="40" y2="170" stroke="#e74c3c" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
</svg>
