<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Background -->
  <rect width="800" height="500" fill="#0a0a1a"/>

  <!-- Stars -->
  <circle cx="50" cy="40" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="120" cy="80" r="1" fill="white" opacity="0.6"/>
  <circle cx="200" cy="30" r="2" fill="white" opacity="0.9"/>
  <circle cx="300" cy="60" r="1" fill="white" opacity="0.7"/>
  <circle cx="400" cy="20" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="500" cy="50" r="1" fill="white" opacity="0.6"/>
  <circle cx="620" cy="35" r="2" fill="white" opacity="0.9"/>
  <circle cx="700" cy="70" r="1" fill="white" opacity="0.7"/>
  <circle cx="780" cy="25" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="750" cy="100" r="1" fill="white" opacity="0.5"/>
  <circle cx="80" cy="150" r="1" fill="white" opacity="0.5"/>
  <circle cx="660" cy="130" r="1.5" fill="white" opacity="0.7"/>

  <!-- Big glowing orb: The Universe Simulator -->
  <circle cx="400" cy="250" r="180" fill="none" stroke="#3344ff" stroke-width="2" opacity="0.3"/>
  <circle cx="400" cy="250" r="140" fill="none" stroke="#5566ff" stroke-width="2" opacity="0.4"/>
  <circle cx="400" cy="250" r="100" fill="none" stroke="#7788ff" stroke-width="3" opacity="0.6"/>
  <circle cx="400" cy="250" r="60" fill="#1a1a4a" stroke="#aabbff" stroke-width="3"/>
  <circle cx="400" cy="250" r="58" fill="url(#innerGlow)"/>

  <!-- Gradient for inner glow -->
  <defs>
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6688ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1a1a4a" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2233aa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0a0a1a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background halo -->
  <circle cx="400" cy="250" r="200" fill="url(#bgGlow)"/>

  <!-- Orbiting mini simulations -->
  <!-- Atom -->
  <g transform="translate(220, 150)">
    <circle cx="0" cy="0" r="10" fill="#ff6644"/>
    <ellipse cx="0" cy="0" rx="22" ry="9" fill="none" stroke="#ff9944" stroke-width="1.5" transform="rotate(30)"/>
    <ellipse cx="0" cy="0" rx="22" ry="9" fill="none" stroke="#ff9944" stroke-width="1.5" transform="rotate(90)"/>
    <ellipse cx="0" cy="0" rx="22" ry="9" fill="none" stroke="#ff9944" stroke-width="1.5" transform="rotate(150)"/>
  </g>
  <text x="220" y="195" text-anchor="middle" fill="#ff9944" font-size="11" font-family="monospace">physics</text>

  <!-- Brain/AI node -->
  <g transform="translate(580, 150)">
    <ellipse cx="0" cy="0" rx="22" ry="18" fill="#44dd88" opacity="0.8"/>
    <line x1="-10" y1="-5" x2="-18" y2="-12" stroke="#22aa55" stroke-width="1.5"/>
    <line x1="0" y1="-10" x2="0" y2="-20" stroke="#22aa55" stroke-width="1.5"/>
    <line x1="10" y1="-5" x2="18" y2="-12" stroke="#22aa55" stroke-width="1.5"/>
    <line x1="-10" y1="5" x2="-18" y2="12" stroke="#22aa55" stroke-width="1.5"/>
    <line x1="10" y1="5" x2="18" y2="12" stroke="#22aa55" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" fill="white" font-size="10" font-family="monospace" font-weight="bold">AI</text>
  </g>
  <text x="580" y="185" text-anchor="middle" fill="#44dd88" font-size="11" font-family="monospace">consciousness</text>

  <!-- Economy dollar sign -->
  <g transform="translate(165, 340)">
    <circle cx="0" cy="0" r="20" fill="#ffdd22" opacity="0.85"/>
    <text x="0" y="7" text-anchor="middle" fill="#885500" font-size="20" font-weight="bold" font-family="serif">$</text>
  </g>
  <text x="165" y="375" text-anchor="middle" fill="#ffdd22" font-size="11" font-family="monospace">economy</text>

  <!-- DNA helix -->
  <g transform="translate(580, 340)">
    <path d="M-8,-18 Q0,-10 8,-2 Q0,6 -8,14 Q0,22 8,30" fill="none" stroke="#ff44aa" stroke-width="2.5"/>
    <path d="M8,-18 Q0,-10 -8,-2 Q0,6 8,14 Q0,22 -8,30" fill="none" stroke="#aa44ff" stroke-width="2.5"/>
    <line x1="-4" y1="-14" x2="4" y2="-14" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <line x1="-6" y1="-2" x2="6" y2="-2" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <line x1="-4" y1="10" x2="4" y2="10" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <line x1="-6" y1="22" x2="6" y2="22" stroke="white" stroke-width="1.5" opacity="0.7"/>
  </g>
  <text x="580" y="385" text-anchor="middle" fill="#ff44aa" font-size="11" font-family="monospace">biology</text>

  <!-- Connecting lines (dashed) from outer nodes to inner circle -->
  <line x1="246" y1="170" x2="340" y2="210" stroke="#5566ff" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
  <line x1="558" y1="170" x2="460" y2="210" stroke="#5566ff" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
  <line x1="183" y1="340" x2="340" y2="290" stroke="#5566ff" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
  <line x1="558" y1="340" x2="460" y2="290" stroke="#5566ff" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>

  <!-- Center text -->
  <text x="400" y="240" text-anchor="middle" fill="white" font-size="15" font-family="monospace" font-weight="bold">UNIVERSE</text>
  <text x="400" y="260" text-anchor="middle" fill="#aabbff" font-size="12" font-family="monospace">SIM v1.0</text>
  <text x="400" y="278" text-anchor="middle" fill="#8899ff" font-size="10" font-family="monospace">100% accurate*</text>

  <!-- Title text -->
  <text x="400" y="455" text-anchor="middle" fill="white" font-size="22" font-weight="bold" font-family="monospace">SIMULATE EVERYTHING</text>
  <text x="400" y="478" text-anchor="middle" fill="#8899ff" font-size="12" font-family="monospace">*except your love life</text>
</svg>
